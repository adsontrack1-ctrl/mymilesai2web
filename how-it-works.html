const HIWDetail = () => {
  const steps = [
    {
      n:'01',
      title:'Install and forget about setup.',
      sub:'Takes 90 seconds. Then never again.',
      bullets:[
        'Download from the App Store',
        'Sign in with Google, Apple, or email',
        'Grant location permission (background mode)',
        'That\'s it — there is no step 4',
      ],
      note:'No hardware. No OBD plug. No Bluetooth beacon. Just your phone and 90 seconds of your time.',
      color:'#1B4DDB',
    },
    {
      n:'02',
      title:'Drive normally. We track everything.',
      sub:'Zero taps per trip.',
      bullets:[
        'App detects driving motion automatically',
        'Logs start point, end point, route, and distance',
        'Records timestamps and duration',
        'Runs silently even when your phone is locked',
      ],
      note:'"You drove 12.3 miles from your office to a client meeting. We logged it. You didn\'t have to think about it." Every logged mile = $0.725 in potential deductions.',
      color:'#16A34A',
    },
    {
      n:'03',
      title:'Classify at the end of the day.',

  return (
    <section style={{padding:'80px 56px',background:'#FFFFFF',borderTop:'1px solid #E6E1D8'}}>
      <div style={{fontFamily:"ui-monospace,'SF Mono',Menlo,monospace",fontSize:11,letterSpacing:'0.2em',textTransform:'uppercase',color:'#6B6862',marginBottom:24}}>— Step by step</div>

        {steps.map((s,i)=>(

const HIWCalculator = () => {
  const [miles, setMiles] = React.useState(100);
  const rate = 0.725;
  const annual = Math.round(miles * 52 * rate);
  const weekly = (miles * rate).toFixed(2);
  return (
    <section style={{padding:'80px 56px',background:'#0F1729',color:'#F6F3EE'}}>
      <div style={{maxWidth:680,margin:'0 auto',textAlign:'center'}}>
        <div style={{fontFamily:"ui-monospace,'SF Mono',Menlo,monospace",fontSize:11,letterSpacing:'0.2em',textTransform:'uppercase',color:'rgba(246,243,238,0.5)',marginBottom:20}}>— Quick calculator</div>
        <h2 style={{fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",fontWeight:800,fontSize:'clamp(24px,3vw,38px)',lineHeight:1.1,letterSpacing:'-0.025em',marginBottom:16}}>
          How much are you leaving on the table?
        </h2>
        <p style={{fontSize:15,color:'rgba(246,243,238,0.65)',marginBottom:48}}>Enter your typical business miles per week and see your estimated annual deduction at the 2026 IRS rate.</p>
        <div style={{background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:16,padding:'40px 40px',marginBottom:32}}>
          <div style={{marginBottom:32}}>
            <label style={{display:'block',fontSize:14,color:'rgba(246,243,238,0.7)',marginBottom:12,fontFamily:"ui-monospace,'SF Mono',Menlo,monospace",letterSpacing:'0.08em',textTransform:'uppercase'}}>Business miles per week</label>
            <div style={{display:'flex',alignItems:'center',gap:16}}>
              <input
                type="range" min={10} max={500} step={10} value={miles}
                onChange={e=>setMiles(Number(e.target.value))}
                style={{flex:1,accentColor:'#1B4DDB',height:6,cursor:'pointer'}}
              />
              <div style={{fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",fontWeight:800,fontSize:28,color:'#FFFFFF',minWidth:64,textAlign:'right'}}>{miles}</div>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
            <div style={{background:'rgba(27,77,219,0.2)',border:'1px solid rgba(27,77,219,0.3)',borderRadius:10,padding:'20px 16px',textAlign:'center'}}>
              <div style={{fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",fontWeight:800,fontSize:32,color:'#378ADD',lineHeight:1,marginBottom:6}}>${weekly}</div>
              <div style={{fontSize:12,color:'rgba(246,243,238,0.55)',fontFamily:"ui-monospace,'SF Mono',Menlo,monospace",letterSpacing:'0.08em',textTransform:'uppercase'}}>Weekly deduction</div>
            </div>
            <div style={{background:'rgba(201,169,110,0.15)',border:'1px solid rgba(201,169,110,0.3)',borderRadius:10,padding:'20px 16px',textAlign:'center'}}>
              <div style={{fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",fontWeight:800,fontSize:32,color:'#C9A96E',lineHeight:1,marginBottom:6}}>${annual.toLocaleString()}</div>
              <div style={{fontSize:12,color:'rgba(246,243,238,0.55)',fontFamily:"ui-monospace,'SF Mono',Menlo,monospace",letterSpacing:'0.08em',textTransform:'uppercase'}}>Annual deduction</div>
            </div>
          </div>
          <div style={{marginTop:20,fontSize:12,color:'rgba(246,243,238,0.4)',fontFamily:"ui-monospace,'SF Mono',Menlo,monospace"}}>
            At $0.725/mi IRS 2026 rate · {miles} mi/wk × 52 weeks · Not tax advice — consult a CPA
          </div>
        </div>
        <a href="signup/" style={{background:'#1B4DDB',color:'#FFFFFF',padding:'18px 36px',borderRadius:100,fontSize:15,fontWeight:700,textDecoration:'none',display:'inline-flex',alignItems:'center',gap:8,boxShadow:'0 12px 32px -8px rgba(27,77,219,0.5)'}}>
