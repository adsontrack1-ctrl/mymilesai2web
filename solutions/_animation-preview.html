<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#F0F2F5;color:#111827;font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
  button{font-family:inherit;cursor:pointer}

  /* ── Keyframes (prefixed pa- to avoid collision with marketing.css) ── */
  @keyframes pa-pin-drop {
    0%   { transform: translateY(-40px) scale(0.55); opacity: 0; }
    65%  { transform: translateY(5px) scale(1.1); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes pa-up {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  @keyframes pa-right {
    from { transform: translateX(22px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  @keyframes pa-fade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes pa-row {
    from { transform: translateX(-10px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  @keyframes pa-gold-pop {
    0%   { transform: scale(0.78); opacity: 0; }
    62%  { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes pa-gold-glow {
    0%,100% { text-shadow: 0 0 0 transparent; }
    50%      { text-shadow: 0 0 14px rgba(201,169,110,0.7), 0 0 30px rgba(201,169,110,0.25); }
  }
  @keyframes pa-status-in {
    from { transform: translateY(8px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  @keyframes pa-route-draw {
    from { stroke-dashoffset: 400; opacity: 0; }
    to   { stroke-dashoffset: 0; opacity: 1; }
  }

  /* ── Phone frame ── */
  .pa-phone {
    width: 252px;
    height: 450px;
    background: #090E1A;
    border-radius: 38px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow:
      0 0 0 1.5px rgba(201,169,110,0.28),
      0 0 0 3px #0D1117,
      0 36px 90px -18px rgba(27,77,219,0.55),
      0 10px 30px -10px rgba(27,77,219,0.22),
      inset 0 1px 0 rgba(255,255,255,0.07);
  }
  .pa-notch {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 54px;
    height: 6px;
    background: rgba(255,255,255,0.13);
    border-radius: 3px;
    z-index: 10;
    pointer-events: none;
  }
  .pa-screen {
    position: absolute;
    top: 10px;
    left: 8px;
    right: 8px;
    bottom: 10px;
    border-radius: 30px;
    overflow: hidden;
  }

  /* ── Status chip (below phone) ── */
  .pa-chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 16px;
    border: 1px solid;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 700;
    animation: pa-status-in 0.3s ease both;
    white-space: nowrap;
  }
  .pa-chip-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Controls ── */
  .pa-ctrl-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; }
  .pa-btn {
    padding: 7px 13px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    border: 1.5px solid #E5E7EB;
    background: #fff;
    color: #6B7280;
    transition: all 0.14s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .pa-btn.on { border-color: #1B4DDB; background: #EFF3FF; color: #1B4DDB; }
  .pa-btn:hover:not(.on) { border-color: #9CA3AF; color: #374151; }

  /* ── Page layout ── */
  .pa-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 80px; }
  .pa-head { text-align: center; max-width: 560px; margin-bottom: 28px; }
  .pa-head .eyebrow { font-size: 12px; font-weight: 600; color: #1B4DDB; margin-bottom: 10px; }
  .pa-head h1 { font-family: 'Plus Jakarta Sans',system-ui,sans-serif; font-weight: 800; font-size: clamp(1.35rem,2.5vw,1.75rem); color: #111827; margin-bottom: 8px; }
  .pa-head p { font-size: 13px; color: #6B7280; line-height: 1.6; }
  .pa-controls { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 28px; width: 100%; max-width: 560px; }
  .pa-ctrl-lbl { font-size: 11px; font-weight: 600; color: #9CA3AF; min-width: 50px; text-align: right; flex-shrink: 0; }
  .pa-anim-wrap { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .pa-meta {
    background: #fff;
    border: 1px solid #E5E7EB;
    border-radius: 14px;
    padding: 16px 20px;
    max-width: 300px;
    width: 100%;
    margin-top: 4px;
  }
  .pa-meta-row { display: flex; justify-content: space-between; gap: 12px; }
  .pa-meta-cell .lbl { font-size: 10px; color: #9CA3AF; margin-bottom: 3px; }
  .pa-meta-cell .val { font-weight: 700; font-size: 13px; color: #111827; }
  .pa-meta-cell .val.accent { color: #1B4DDB; font-size: 16px; font-family: 'Plus Jakarta Sans',system-ui,sans-serif; font-weight: 800; }
  .pa-trust { margin-top: 12px; padding-top: 12px; border-top: 1px solid #F3F4F6; font-size: 11px; color: #9CA3AF; text-align: center; line-height: 1.5; }
  .pa-rm-note { margin-top: 16px; padding: 10px 18px; background: #FEF3C7; border: 1px solid #FDE68A; border-radius: 10px; font-size: 12px; color: #92400E; text-align: center; max-width: 380px; }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .pa-phone { width: 224px; height: 400px; border-radius: 32px; }
    .pa-screen { top: 8px; left: 6px; right: 6px; bottom: 8px; border-radius: 25px; }
  }
  @media (max-width: 380px) {
    .pa-phone { width: 200px; height: 356px; border-radius: 28px; }
  }

  /* ── Reduced motion: collapse all animations, show final states ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0ms !important;
      animation-delay: 0ms !important;
      transition-duration: 0ms !important;
    }
  }
</style>
</head>
<body>

<script src="locale.js"></script>
<script src="../assets/vendor/react.production.min.js"></script>
<script src="../assets/vendor/react-dom.production.min.js"></script>

<script type="text/babel">

const BEAT_MS  = 2000;
const REDUCED  = typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const PERSONAS_LIST = [
  { slug: 'realtors',       label: 'Realtors'    },
  { slug: 'rideshare',      label: 'Rideshare'   },
  { slug: 'freelancers',    label: 'Freelancers' },
  { slug: 'small-business', label: 'Small Biz'   },
  { slug: 'construction',   label: 'Trades'      },
  { slug: 'sales-reps',     label: 'Sales'       },
];

const BEAT_META = [
  { label: 'Drive detected', step: '1/4', color: '#1B4DDB', bg: 'rgba(27,77,219,0.06)',   border: 'rgba(27,77,219,0.22)'  },
  { label: 'Classified',     step: '2/4', color: '#1B4DDB', bg: 'rgba(27,77,219,0.06)',   border: 'rgba(27,77,219,0.22)'  },
  { label: 'Logged',         step: '3/4', color: '#16A34A', bg: 'rgba(22,163,74,0.06)',   border: 'rgba(22,163,74,0.25)'  },
  { label: 'Deducted',       step: '4/4', color: '#C9A96E', bg: 'rgba(201,169,110,0.07)', border: 'rgba(201,169,110,0.35)'},
];

/* ─────────────────────────────────────────────────────────────────
   Beat 1 — GPS map / drive detection
───────────────────────────────────────────────────────────────── */
const BeatDetect = () => (
  <div style={{width:'100%',height:'100%',background:'#08101E',position:'relative',overflow:'hidden',fontFamily:"'DM Sans',system-ui,sans-serif"}}>

    {/* Map grid */}
    <svg style={{position:'absolute',inset:0,width:'100%',height:'100%'}} aria-hidden="true">
      {[22,44,66,88].map(y => <line key={'h'+y} x1="0" y1={`${y}%`} x2="100%" y2={`${y}%`} stroke="#1B4DDB" strokeWidth="0.5" opacity="0.16"/>)}
      {[20,40,60,80].map(x => <line key={'v'+x} x1={`${x}%`} y1="0" x2={`${x}%`} y2="100%" stroke="#1B4DDB" strokeWidth="0.5" opacity="0.16"/>)}
      {/* Route line — drawn via stroke-dashoffset animation */}
      <path
        d="M 46 400 Q 88 270 150 210 T 235 95"
        fill="none"
        stroke="#1B4DDB"
        strokeWidth="2.5"
        strokeDasharray="400"
        strokeLinecap="round"
        style={{animation:'pa-route-draw 0.8s 0.15s ease both'}}
      />
      {/* Origin dot */}
      <circle cx="46" cy="400" r="5.5" fill="#F8F9FA" style={{animation:'pa-fade 0.3s ease both'}}/>
      {/* Destination ring */}
      <circle cx="235" cy="95" r="14" fill="none" stroke="rgba(27,77,219,0.3)" strokeWidth="1.5" style={{animation:'pa-fade 0.4s 0.7s ease both'}}/>
    </svg>

    {/* GPS pin drop */}
    <div style={{position:'absolute',top:'18%',left:'63%',transformOrigin:'50% 100%',animation:'pa-pin-drop 0.7s 0.4s cubic-bezier(0.22,1,0.36,1) both'}}>
      <svg viewBox="0 0 28 36" width={27} height={34} fill="none" aria-hidden="true">
        <path d="M14 0C6.3 0 0 6.3 0 14c0 8.4 14 22 14 22S28 22.4 28 14C28 6.3 21.7 0 14 0z" fill="#1B4DDB"/>
        <circle cx="14" cy="14" r="5.5" fill="#F8F9FA"/>
        <circle cx="14" cy="14" r="2" fill="#1B4DDB"/>
      </svg>
      {/* Pin shadow */}
      <div style={{position:'absolute',bottom:-6,left:'50%',transform:'translateX(-50%)',width:12,height:5,background:'rgba(27,77,219,0.45)',borderRadius:'50%',filter:'blur(3px)'}}/>
    </div>

    {/* Status bubble */}
    <div style={{position:'absolute',bottom:18,left:10,right:10,animation:'pa-up 0.4s 0.9s ease both'}}>
      <div style={{background:'rgba(27,77,219,0.88)',border:'1px solid rgba(55,138,221,0.3)',borderRadius:13,padding:'11px 14px',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)'}}>
        <div style={{fontSize:9,color:'rgba(248,249,250,0.5)',marginBottom:3,letterSpacing:'0.07em',fontFamily:"ui-monospace,'SF Mono',Menlo,monospace"}}>● Background tracking</div>
        <div style={{fontSize:14,fontWeight:700,color:'#F8F9FA'}}>Drive detected</div>
      </div>
    </div>

    {/* Clock */}
    <div style={{position:'absolute',top:11,right:13,fontSize:9,color:'rgba(248,249,250,0.28)',fontFamily:"ui-monospace,'SF Mono',Menlo,monospace",fontVariantNumeric:'tabular-nums'}}>09:42:17</div>
  </div>
);

/* ─────────────────────────────────────────────────────────────────
   Beat 2 — AI classification
───────────────────────────────────────────────────────────────── */
const BeatClassify = ({persona, locale}) => {
  const s = window.MM.strings[locale];
  const p = window.MM.personas[persona][locale];
  const trip = p.trips[0];
  return (
    <div style={{width:'100%',height:'100%',background:'#F8F9FA',display:'flex',flexDirection:'column',padding:'14px 12px',gap:10,fontFamily:"'DM Sans',system-ui,sans-serif"}}>

      <div style={{fontSize:10,color:'#9CA3AF',animation:'pa-fade 0.3s ease both',marginTop:6}}>New trip detected</div>

      {/* Trip card */}
      <div style={{background:'#fff',border:'1px solid #E5E7EB',borderRadius:12,padding:'12px 13px',animation:'pa-up 0.4s 0.1s ease both'}}>
        <div style={{fontSize:10,color:'#6B7280',marginBottom:4,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{trip.route}</div>
        <div style={{fontWeight:800,fontSize:22,color:'#111827',fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",lineHeight:1}}>{trip.dist} {s.unitShort}</div>
        <div style={{fontSize:11,color:'#16A34A',marginTop:5,fontWeight:600}}>${trip.amount} deductible · {s.rateShort}</div>
      </div>

      {/* Swipe row */}
      <div style={{display:'flex',gap:8,animation:'pa-up 0.4s 0.22s ease both'}}>
        <div style={{flex:1,background:'#F3F4F6',borderRadius:10,padding:'9px 6px',textAlign:'center',fontSize:11,fontWeight:600,color:'#9CA3AF'}}>← Personal</div>
        <div style={{flex:1.2,background:'#1B4DDB',borderRadius:10,padding:'9px 6px',textAlign:'center',fontSize:11,fontWeight:700,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
          <svg viewBox="0 0 12 12" width={9} height={9} fill="none" aria-hidden="true"><path d="M6 1L7.5 4.5H11L8 7L9.5 11L6 8.5L2.5 11L4 7L1 4.5H4.5Z" fill="#fff" opacity="0.85"/></svg>
          Business →
        </div>
      </div>

      {/* AI badge */}
      <div style={{display:'flex',justifyContent:'center',animation:'pa-right 0.4s 0.42s ease both'}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:5,background:'#EFF3FF',border:'1px solid #C7D6FB',borderRadius:100,padding:'5px 12px'}}>
          <svg viewBox="0 0 12 12" width={9} height={9} fill="none" aria-hidden="true"><path d="M6 1L7.5 4.5H11L8 7L9.5 11L6 8.5L2.5 11L4 7L1 4.5H4.5Z" fill="#1B4DDB" opacity="0.85"/></svg>
          <span style={{fontSize:11,fontWeight:700,color:'#1B4DDB'}}>AI classified · Business</span>
        </div>
      </div>
    </div>
  );
};

/* ─────────────────────────────────────────────────────────────────
   Beat 3 — Logging counter
───────────────────────────────────────────────────────────────── */
const BeatLog = ({persona, locale}) => {
  const s  = window.MM.strings[locale];
  const p  = window.MM.personas[persona][locale];
  const distTotal = p.trips.reduce((sum, t) => sum + parseFloat(t.dist), 0);
  const [count, setCount] = React.useState(REDUCED ? 47 : 1);

  React.useEffect(() => {
    if (REDUCED) { setCount(47); return; }
    let active = true;
    const start = Date.now(), dur = 1500, target = 47;
    const tick = () => {
      if (!active) return;
      const prog = Math.min((Date.now() - start) / dur, 1);
      setCount(Math.round(1 + (target - 1) * (1 - Math.pow(1 - prog, 3))));
      if (prog < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
    return () => { active = false; };
  }, []);

  const runDist = (distTotal * count / 47).toFixed(1);

  return (
    <div style={{width:'100%',height:'100%',background:'#F8F9FA',padding:'12px 12px',fontFamily:"'DM Sans',system-ui,sans-serif"}}>

      {/* Stacked trip cards */}
      <div style={{position:'relative',height:132,marginBottom:12}}>
        {[2,1,0].map(i => (
          <div key={i} style={{
            position:'absolute',
            top: i * 5,
            left: -(i * 5),
            right: -(i * 5),
            background:'#fff',
            border:'1px solid #E5E7EB',
            borderRadius:10,
            padding:'9px 11px',
            boxShadow: i === 0 ? '0 3px 12px -4px rgba(0,0,0,0.1)' : 'none',
            animation:`pa-up 0.4s ${(2 - i) * 0.06}s ease both`,
          }}>
            {i === 0 && p.trips[0] && <>
              <div style={{fontSize:10,color:'#6B7280',marginBottom:3,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{p.trips[0].route}</div>
              <div style={{fontWeight:700,fontSize:15,color:'#111827'}}>{p.trips[0].dist} {s.unitShort}</div>
            </>}
          </div>
        ))}
      </div>

      {/* Counter */}
      <div style={{background:'#fff',border:'1px solid #E5E7EB',borderRadius:10,padding:'11px 13px',display:'flex',justifyContent:'space-between',alignItems:'center',animation:'pa-fade 0.4s 0.18s ease both'}}>
        <div>
          <div style={{fontSize:10,color:'#6B7280',marginBottom:2}}>Trips logged</div>
          <div style={{fontWeight:800,fontSize:30,color:'#1B4DDB',fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",lineHeight:1,fontVariantNumeric:'tabular-nums'}}>{count}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:10,color:'#6B7280',marginBottom:2}}>Distance</div>
          <div style={{fontWeight:700,fontSize:14,color:'#111827',fontVariantNumeric:'tabular-nums'}}>{runDist} {s.unitShort}</div>
        </div>
      </div>
    </div>
  );
};

/* ─────────────────────────────────────────────────────────────────
   Beat 4 — Tax form + deduction (locale-aware)
───────────────────────────────────────────────────────────────── */
const BeatDeduct = ({persona, locale}) => {
  const s = window.MM.strings[locale];
  const p = window.MM.personas[persona][locale];
  return (
    <div style={{width:'100%',height:'100%',background:'#fff',padding:'14px 12px',overflow:'hidden',fontFamily:"'DM Sans',system-ui,sans-serif"}}>

      {/* Form header */}
      <div style={{marginBottom:10,paddingBottom:10,borderBottom:'1px solid #E5E7EB',animation:'pa-fade 0.35s ease both'}}>
        <div style={{fontSize:9,color:'#9CA3AF',marginBottom:2,fontFamily:"ui-monospace,'SF Mono',Menlo,monospace",letterSpacing:'0.05em'}}>{s.formHeader}</div>
        <div style={{fontWeight:700,fontSize:13,color:'#111827'}}>Mileage Log · Annual</div>
      </div>

      {/* Trip rows */}
      {p.trips.map((t, i) => (
        <div key={i} style={{
          display:'flex',
          justifyContent:'space-between',
          alignItems:'center',
          padding:'5px 0',
          borderBottom:'1px solid #F3F4F6',
          fontSize:10,
          animation:`pa-row 0.3s ${0.12 + i * 0.1}s ease both`,
        }}>
          <span style={{color:'#374151',flex:1,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',paddingRight:6,maxWidth:'74%'}}>{t.route}</span>
          <span style={{color:'#1B4DDB',fontWeight:600,fontVariantNumeric:'tabular-nums',fontSize:11}}>{t.dist}</span>
        </div>
      ))}

      {/* Deduction total — gold pop + infinite glow */}
      <div style={{
        marginTop:10,
        paddingTop:9,
        borderTop:'1.5px solid #111827',
        display:'flex',
        justifyContent:'space-between',
        alignItems:'baseline',
        animation:'pa-gold-pop 0.55s 0.55s cubic-bezier(0.22,1,0.36,1) both',
      }}>
        <span style={{fontSize:10,color:'#6B7280'}}>Est. annual deduction</span>
        <span style={{
          fontWeight:800,
          fontSize:18,
          fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",
          color:'#C9A96E',
          lineHeight:1,
          animation:'pa-gold-glow 2s 1.1s ease-in-out infinite',
        }}>{p.deduction}</span>
      </div>

      {/* Compliance note */}
      <div style={{marginTop:10,fontSize:9,color:'#9CA3AF',textAlign:'center',animation:'pa-fade 0.4s 0.9s ease both'}}>{s.complianceLabel} · {s.form1}</div>
    </div>
  );
};

/* ─────────────────────────────────────────────────────────────────
   HeroAnim — orchestrates beats
───────────────────────────────────────────────────────────────── */
const HeroAnim = ({persona, locale}) => {
  const [beat, setBeat] = React.useState(REDUCED ? 3 : 0);
  const [tick, setTick]  = React.useState(0); // ensures remount on every beat change

  React.useEffect(() => {
    if (REDUCED) return;
    const t = setTimeout(() => {
      setBeat(b => (b + 1) % 4);
      setTick(t => t + 1);
    }, BEAT_MS);
    return () => clearTimeout(t);
  }, [beat]);

  const meta = BEAT_META[beat];

  return (
    <div className="pa-anim-wrap">

      {/* Phone */}
      <div className="pa-phone">
        <div className="pa-notch" aria-hidden="true"/>
        <div className="pa-screen">
          {beat === 0 && <BeatDetect key={'b0-' + tick}/>}
          {beat === 1 && <BeatClassify key={'b1-' + tick} persona={persona} locale={locale}/>}
          {beat === 2 && <BeatLog key={'b2-' + tick} persona={persona} locale={locale}/>}
          {beat === 3 && <BeatDeduct key={'b3-' + tick} persona={persona} locale={locale}/>}
        </div>
      </div>

      {/* Status chip */}
      <div key={'chip-' + tick} className="pa-chip" style={{color:meta.color,background:meta.bg,borderColor:meta.border}}>
        <span className="pa-chip-dot" style={{background:meta.color}}/>
        <span style={{fontSize:10,opacity:0.5,marginRight:1}}>{meta.step}</span>
        {meta.label}
      </div>

      {/* Progress dots — clickable for manual override */}
      <div style={{display:'flex',gap:6}} role="tablist" aria-label="Animation steps">
        {BEAT_META.map((m, i) => (
          <button
            key={i}
            role="tab"
            aria-selected={i === beat}
            aria-label={m.label}
            onClick={() => { setBeat(i); setTick(t => t + 1); }}
            style={{
              width: i === beat ? 22 : 7,
              height: 7,
              borderRadius: 4,
              background: i === beat ? '#1B4DDB' : i < beat ? '#C7D6FB' : '#E5E7EB',
              border: 'none',
              padding: 0,
              transition: 'all 0.25s ease',
            }}
          />
        ))}
      </div>
    </div>
  );
};

/* ─────────────────────────────────────────────────────────────────
   Flag SVG component (shared)
───────────────────────────────────────────────────────────────── */
const Flag = ({code}) => code === 'US' ? (
  <span style={{width:16,height:11,display:'inline-block',background:'linear-gradient(180deg,#B22234 33%,#FFF 33%,#FFF 66%,#B22234 66%)',borderRadius:2,position:'relative',overflow:'hidden',flexShrink:0}}>
    <span style={{position:'absolute',top:0,left:0,width:6,height:5,background:'#3C3B6E'}}/>
  </span>
) : (
  <span style={{width:16,height:11,display:'inline-block',background:'linear-gradient(90deg,#D52B1E 0 25%,#FFF 25% 75%,#D52B1E 75%)',borderRadius:2,position:'relative',overflow:'hidden',flexShrink:0}}>
    <span style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',color:'#D52B1E',fontSize:7,lineHeight:1,fontWeight:700}}>🍁</span>
  </span>
);

/* ─────────────────────────────────────────────────────────────────
   Preview page
───────────────────────────────────────────────────────────────── */
const Preview = () => {
  const [persona, setPersona] = React.useState('realtors');
  const [locale,  setLocale]  = React.useState(window.MM.get());

  React.useEffect(() => {
    const h = e => setLocale(e.detail.locale);
    document.addEventListener('mm-locale-change', h);
    return () => document.removeEventListener('mm-locale-change', h);
  }, []);

  const s     = window.MM.strings[locale];
  const p     = window.MM.personas[persona][locale];
  const pName = PERSONAS_LIST.find(x => x.slug === persona)?.label || persona;

  return (
    <div className="pa-page">

      {/* Header */}
      <div className="pa-head">
        <div className="eyebrow">— Animation preview · Checkpoint 2</div>
        <h1>Hero animation system</h1>
        <p>4-beat · ~8s loop · 6 personas × 2 locales · pure CSS + SVG<br/>Click the dots to jump to any beat · Toggle locale/persona below</p>
      </div>

      {/* Controls */}
      <div className="pa-controls">
        <div className="pa-ctrl-row">
          <span className="pa-ctrl-lbl">Locale</span>
          {['US', 'CA'].map(r => (
            <button key={r} className={`pa-btn${locale === r ? ' on' : ''}`} onClick={() => window.MM.set(r)}>
              <Flag code={r}/> {r}
            </button>
          ))}
        </div>
        <div className="pa-ctrl-row">
          <span className="pa-ctrl-lbl">Persona</span>
          {PERSONAS_LIST.map(px => (
            <button key={px.slug} className={`pa-btn${persona === px.slug ? ' on' : ''}`} onClick={() => setPersona(px.slug)}>
              {px.label}
            </button>
          ))}
        </div>
      </div>

      {/* Animation */}
      <HeroAnim persona={persona} locale={locale}/>

      {/* Contextual data */}
      <div className="pa-meta">
        <div className="pa-meta-row">
          <div className="pa-meta-cell">
            <div className="lbl">Persona</div>
            <div className="val">{pName}</div>
          </div>
          <div className="pa-meta-cell" style={{textAlign:'center'}}>
            <div className="lbl">Est. deduction</div>
            <div className="val accent">{p.deduction}</div>
          </div>
          <div className="pa-meta-cell" style={{textAlign:'right'}}>
            <div className="lbl">Distance / yr</div>
            <div className="val">{p.distance}</div>
          </div>
        </div>
        <div className="pa-trust">{s.trustStrip}</div>
      </div>

      {REDUCED && (
        <div className="pa-rm-note">
          prefers-reduced-motion detected — animation cycling disabled, showing Beat 4 (Deducted) static end-state.
        </div>
      )}

    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<Preview/>);
</script>

</body>
</html>
