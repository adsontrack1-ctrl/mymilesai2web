  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#FFFFFF;color:#111827;font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}

<body>

<script src="../locale.js"></script>

<script type="text/babel" src="../../ms-parts2.jsx?v=2026-05-11a"></script>
<script type="text/babel" src="../sol-parts.jsx?v=2026-05-11a"></script>

<script type="text/babel">
const RouteVisual = ({from, to, context, dist, unit, amount}) => (
  <div style={{padding:'18px 16px',fontFamily:"'DM Sans',system-ui,sans-serif"}}>
    <div style={{fontSize:10,fontWeight:700,color:'#6B7280',letterSpacing:'0.06em',marginBottom:12}}>TRIP DETECTED</div>
    <div style={{display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,paddingBottom:6}}>
        <div style={{width:8,height:8,borderRadius:'50%',background:'#1B4DDB',flexShrink:0}}/>
        <span style={{fontSize:13,color:'#111827',fontWeight:600}}>{from}</span>
      </div>
      <div style={{borderLeft:'1.5px dashed #C7D6FB',marginLeft:'3.5px',height:20}}/>
      <div style={{display:'flex',alignItems:'center',gap:10,paddingTop:6}}>
        <div style={{width:8,height:8,borderRadius:2,background:'#C9A96E',flexShrink:0}}/>
        <span style={{fontSize:13,color:'#111827',fontWeight:600}}>{to} · {context}</span>
      </div>
    </div>
    <div style={{marginTop:12,padding:'8px 12px',background:'#EFF3FF',borderRadius:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span style={{fontSize:12,fontWeight:700,color:'#1B4DDB'}}>✓ Auto-logged</span>
      <span style={{fontSize:12,color:'#1B4DDB',fontWeight:600}}>{dist} {unit} · ${amount}</span>
    </div>
  </div>
);

const ClassifyVisual = ({bizLabel}) => (
  <div style={{padding:'18px 16px',fontFamily:"'DM Sans',system-ui,sans-serif"}}>
    <div style={{fontSize:10,fontWeight:700,color:'#6B7280',letterSpacing:'0.06em',marginBottom:12}}>AI CLASSIFICATION</div>
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      <div style={{padding:'9px 12px',background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:12,fontWeight:700,color:'#16A34A'}}>✓ Business — {bizLabel}</span>
        <span style={{fontSize:11,color:'#16A34A',fontWeight:600}}>94%</span>
      </div>
      <div style={{padding:'9px 12px',background:'#F8F9FA',border:'1px solid #E5E7EB',borderRadius:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:12,color:'#6B7280'}}>Personal — Commute</span>
        <span style={{fontSize:11,color:'#9CA3AF',fontWeight:600}}>6%</span>
      </div>
    </div>
    <div style={{marginTop:10,fontSize:11,color:'#6B7280',lineHeight:1.5}}>No manual tagging. AI handles classification automatically.</div>
  </div>
);

const DeductVisual = ({deduction, distance, complianceLabel, form2}) => (
  <div style={{padding:'20px 16px',fontFamily:"'DM Sans',system-ui,sans-serif",textAlign:'center'}}>
    <div style={{fontSize:10,fontWeight:700,color:'#6B7280',letterSpacing:'0.06em',marginBottom:14}}>ANNUAL DEDUCTION</div>
    <div style={{fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",fontWeight:800,fontSize:'clamp(1.75rem,3vw,2.25rem)',color:'#C9A96E',lineHeight:1,marginBottom:4}}>{deduction}</div>
    <div style={{fontSize:12,color:'#6B7280',marginBottom:16}}>{distance} / year</div>
    <div style={{display:'flex',gap:6,justifyContent:'center',flexWrap:'wrap'}}>
      <span style={{fontSize:10,padding:'4px 10px',background:'#EFF3FF',color:'#1B4DDB',borderRadius:100,fontWeight:600,border:'1px solid #C7D6FB'}}>{complianceLabel}</span>
      <span style={{fontSize:10,padding:'4px 10px',background:'#EFF3FF',color:'#1B4DDB',borderRadius:100,fontWeight:600,border:'1px solid #C7D6FB'}}>{form2} ready</span>
    </div>
  </div>
);

const PERSONA = {
  slug: 'rideshare',
  heroSub: (s) => `Captures every deadhead mile, multi-app drive, and delivery run automatically. ${s.auditLabel} log — ready for ${s.scheduleForm} in one tap.`,
  features: [
    (s, p) => ({
      eyebrow: '— Deadhead capture',
      h: 'Every mile between rides is worth money too.',
      p: `Most rideshare drivers only log active-ride miles. MyMilesAI captures every deadhead and repositioning mile automatically — the ones most apps miss but ${s.form1} allows.`,
      stat: p.deduction,
      statLabel: 'estimated annual deduction for full-time rideshare drivers',
      visual: <RouteVisual from="Pickup Zone A" to="Drop-off" context="DoorDash" dist="8.4" unit={s.unitShort} amount="6.09"/>,
      visualBg: '#EFF3FF',
    }),
    (s) => ({
      eyebrow: '— Multi-app support',
      h: 'Uber, Lyft, DoorDash, Instacart — one continuous log.',
      p: "Switch between apps mid-shift and MyMilesAI keeps a single, unbroken mileage log. No manual switching, no gaps, no missed miles regardless of which platform you're on.",
      visual: <ClassifyVisual bizLabel="Rideshare delivery"/>,
      visualBg: '#F0FDF4',
    }),
    (s, p) => ({
      eyebrow: '— Tax-ready exports',
      h: `${s.scheduleForm} ready — one tap.`,
      p: `Export a complete, verified mileage log your accountant can file directly. ${s.auditLabel} · timestamps, totals, and per-trip records — no spreadsheet required.`,
      visual: <DeductVisual deduction={p.deduction} distance={p.distance} complianceLabel={s.complianceLabel} form2={s.form2}/>,
      visualBg: '#FFFBEB',
    }),
  ],
  faqs: [
    { q: 'Does it capture deadhead miles?', a: 'Yes — every mile from drop-off to next pickup is logged automatically, not just active-ride miles.' },
    { q: 'Can I use it across Uber and DoorDash on the same shift?', a: 'Yes. MyMilesAI logs continuous mileage regardless of which app you are actively using.' },
    { q: (s) => `What rate is applied to my deduction?`, a: (s) => `${s.rate}. Your log and deduction total are calculated automatically at the current rate.` },
    { q: 'Do I need to manually tag trip types?', a: 'No. The AI classifies business vs. personal automatically based on your driving patterns and time of day.' },
  ],
  testimonial: {
    quote: "I drive for three apps. Before MyMilesAI I was constantly losing track of deadhead miles. Now everything is logged automatically — I recovered $9,400 last year that I had no idea I was missing.",
    name: "Marcus T.",
    role: "Full-time Rideshare Driver · Atlanta, GA",
    initials: "MT",
  },
};

ReactDOM.createRoot(document.getElementById('root')).render(<SolPersonaPage persona={PERSONA}/>);
</script>

<div id="root"></div>
