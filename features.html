const FeatAdditional = () => {
  const items = [
    {
      icon:<svg viewBox="0 0 24 24" width={20} height={20} fill="none" stroke="#1B4DDB" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M12 2L13.5 6.5H19L14.5 9.5L16 14L12 11L8 14L9.5 9.5L5 6.5H10.5Z"/></svg>,
      title:'Real-Time Deduction Counter',
      desc:'Watch your tax savings grow with every mile. The app shows you a live counter of your estimated deduction at $0.725/mile (or $0.73/km for Canada). At the end of the year, you\'ll know exactly what you\'re claiming before you sit down with your accountant.',
    },
    {
      icon:<svg viewBox="0 0 24 24" width={20} height={20} fill="none" stroke="#1B4DDB" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M12 2L13 3V10L17 8L18 9L13 12V22H11V12L6 9L7 8L11 10V3L12 2Z"/></svg>,
      title:'Works Offline',
      desc:'No signal? No problem. MyMilesAI logs trips even without an internet connection. Trips sync automatically when you\'re back online. Great for rural routes, tunnels, and areas with spotty coverage.',
    },
    {
      icon:<svg viewBox="0 0 24 24" width={20} height={20} fill="none" stroke="#1B4DDB" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2z"/><path d="M2 12h20M12 2a14 14 0 010 20M12 2a14 14 0 000 20"/></svg>,
      title:'Privacy-First',
      desc:'Your location data stays on your device. We use on-device processing — your trips are never sold to third parties, never used for advertising, never shared with data brokers. We make money from subscriptions, not from your location history.',
    },
    {
      icon:<svg viewBox="0 0 24 24" width={20} height={20} fill="none" stroke="#1B4DDB" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v9a2 2 0 01-2 2h-2M9 21a2 2 0 100-4 2 2 0 000 4M20 21a2 2 0 100-4 2 2 0 000 4"/></svg>,
      title:'Multi-Vehicle Support',
      desc:'Company car Monday, personal car Friday? Track across multiple vehicles and MyMilesAI keeps the records separate. Perfect for people who drive different vehicles throughout the week.',
    },
    {
      icon:<svg viewBox="0 0 24 24" width={20} height={20} fill="none" stroke="#1B4DDB" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M20 14.66V20a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2h5.34"/><polygon points="18 2 22 6 12 16 8 16 8 12 18 2"/></svg>,

      desc:'Tag trips by client, project, or purpose. When your accountant asks "what were all your trips to Acme Corp?" you can pull that report in two taps. Organized records make tax time actually bearable.',
    },
    {
      icon:<svg viewBox="0 0 24 24" width={20} height={20} fill="none" stroke="#1B4DDB" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M2 12h20M12 2a14 14 0 010 20M12 2a14 14 0 000 20"/></svg>,

      desc:'Live in Canada? The app auto-detects your region and applies CRA 2026 rates ($0.73/km for the first 5,000 km, $0.67/km after). Reports export in kilometers. Switch any time from the settings.',

  ];
  return (
    <section style={{padding:'80px 56px',background:'#F6F3EE',borderTop:'1px solid #E6E1D8'}}>
      <div style={{fontFamily:"ui-monospace,'SF Mono',Menlo,monospace",fontSize:11,letterSpacing:'0.2em',textTransform:'uppercase',color:'#6B6862',marginBottom:24}}>— More features</div>

const FeatComparison = () => {
  const rows = [
    {feature:'Price',us:'$6.99/mo or $69.99/yr',them:'$5.99/mo (limited free tier)'},
    {feature:'Automatic GPS tracking',us:true,them:true},
    {feature:'AI trip classification',us:true,them:false,themNote:'Manual swipe only'},
    {feature:'Privacy (on-device processing)',us:true,them:false,themNote:'Cloud-based tracking'},
    {feature:'Canada / CRA rate support',us:true,them:false,themNote:'US only'},
    {feature:'Offline mode',us:true,them:false,themNote:'Requires connection'},
    {feature:'IRS Pub. 463 PDF export',us:true,them:false,themNote:'Generic CSV only'},
    {feature:'Client & purpose tagging',us:true,them:false},
    {feature:'No credit card for free trial',us:true,them:false},
  ];
  const Check = ({ok,note}) => ok ? (
    <span style={{display:'inline-flex',alignItems:'center',gap:6,color:'#16A34A',fontWeight:600,fontSize:13}}>
      <svg viewBox="0 0 16 16" width={14} height={14} fill="none"><path d="M3 8L6.5 11.5L13 4.5" stroke="#16A34A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
      Yes
    </span>
  ) : (
    <span style={{display:'inline-flex',alignItems:'center',gap:6,color:'#9A958D',fontSize:13}}>
      <svg viewBox="0 0 16 16" width={14} height={14} fill="none"><path d="M4 4L12 12M12 4L4 12" stroke="#9A958D" strokeWidth="1.8" strokeLinecap="round"/></svg>
      {note || 'No'}
    </span>
  );
  return (
    <section style={{padding:'80px 56px',background:'#FFFFFF',borderTop:'1px solid #E6E1D8'}}>
      <div style={{fontFamily:"ui-monospace,'SF Mono',Menlo,monospace",fontSize:11,letterSpacing:'0.2em',textTransform:'uppercase',color:'#6B6862',marginBottom:24}}>— Comparison</div>
      <h2 style={{fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",fontWeight:800,fontSize:'clamp(26px,3vw,38px)',lineHeight:1.1,letterSpacing:'-0.025em',marginBottom:16,maxWidth:640}}>
        How we stack up against MileIQ.
      </h2>
      <p style={{fontSize:14,color:'#6B6862',marginBottom:48,fontFamily:"ui-monospace,'SF Mono',Menlo,monospace"}}>Comparison based on publicly available information as of May 2026.</p>
      <div style={{border:'1px solid #E6E1D8',borderRadius:14,overflow:'hidden',maxWidth:840}}>
        <div style={{display:'grid',gridTemplateColumns:'1.5fr 1fr 1fr',background:'#F6F3EE',padding:'14px 24px',borderBottom:'1px solid #E6E1D8',fontFamily:"ui-monospace,'SF Mono',Menlo,monospace",fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase',color:'#6B6862'}}>
          <span>Feature</span>
          <span style={{color:'#1B4DDB',fontWeight:700}}>MyMilesAI</span>
          <span>MileIQ</span>
        </div>
        {rows.map((r,i)=>(
          <div key={i} style={{display:'grid',gridTemplateColumns:'1.5fr 1fr 1fr',padding:'14px 24px',borderBottom:i<rows.length-1?'1px solid #F0ECE2':'none',background:i%2===0?'#FFFFFF':'#FAFAF9',alignItems:'center',gap:12}}>
            <span style={{fontSize:14,color:'#0B0F0E'}}>{r.feature}</span>
            <span>{typeof r.us === 'boolean' ? <Check ok={r.us}/> : <span style={{fontSize:14,fontWeight:600,color:'#1B4DDB'}}>{r.us}</span>}</span>
            <span>{typeof r.them === 'boolean' ? <Check ok={r.them} note={r.themNote}/> : <span style={{fontSize:14,color:'#6B6862'}}>{r.them}</span>}</span>
          </div>
        ))}
      </div>
      <p style={{fontSize:13,color:'#9A958D',marginTop:20}}>Switching from MileIQ? We support CSV import so you don't lose your history.</p>
    </section>
  );
};

const Site = () => (

      <h1>Everything you need to claim every mile.</h1>
      <p>Auto GPS tracking, AI classification, IRS-ready exports, and 6 more features built specifically for self-employed professionals who drive for work and need records that hold up at tax time.</p>
    </section>
    <MSFeatures/>
    <FeatAdditional/>
    <FeatComparison/>
    <MSCTA/>
    <MSFooter/>
  </>
);
ReactDOM.createRoot(document.getElementById('root')).render(<Site/>);
</script>
